security:
    # Algoritmo de hashing para contraseñas
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Proveedor de usuarios desde la entidad Usuario
    providers:
        proveedor_usuarios:
            entity:
                class: App\Entity\Usuario
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Firewall único para toda la API (sesión con cookie)
        api:
            pattern: ^/api
            lazy: true
            provider: proveedor_usuarios
            entry_point: App\Security\ApiAuthenticationEntryPoint
            json_login:
                check_path: api_login
                username_path: email
                password_path: password
            logout:
                path: api_logout

        # Firewall por defecto (archivos estáticos, React)
        principal:
            lazy: true

    # Control de acceso por rutas
    access_control:
        # API Admin: solo ROLE_ADMIN
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        # API: registro y login son públicos
        - { path: ^/api/registro, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/login, roles: PUBLIC_ACCESS, methods: [POST] }
        # API: pagos requieren usuario autenticado
        - { path: ^/api/crear-intento-pago, roles: ROLE_USER, methods: [POST] }
        - { path: ^/api/finalizar-compra, roles: ROLE_USER, methods: [POST] }
        # API: logout requiere estar autenticado
        - { path: ^/api/logout, roles: ROLE_USER }
        # API: lectura pública
        - { path: ^/api, roles: PUBLIC_ACCESS, methods: [GET] }
        # Resto público
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
